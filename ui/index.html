<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Naffu</title>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #fafafa;
      --bg-elevated: #ffffff;
      --border: #e5e7eb;
      --border-subtle: #f3f4f6;
      --text: #111827;
      --text-muted: #6b7280;
      --text-faint: #9ca3af;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --accent-bg: #eff6ff;
      --radius: 8px;
      --radius-sm: 6px;
      --shadow: 0 1px 3px rgba(0,0,0,0.06);
      --shadow-lg: 0 4px 12px rgba(0,0,0,0.08);
      --sidebar-w: 260px;
      --header-h: 56px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }

    .app {
      display: flex;
      min-height: 100vh;
    }

    /* Header */
    .header {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: var(--header-h);
      background: var(--bg-elevated);
      border-bottom: 1px solid var(--border);
      padding: 0 1rem;
      align-items: center;
      z-index: 100;
    }
    .menu-btn {
      display: none;
      background: none;
      border: none;
      padding: 0.5rem;
      cursor: pointer;
      color: var(--text);
      border-radius: var(--radius-sm);
    }
    .menu-btn:hover { background: var(--border-subtle); }
    .menu-btn svg { width: 24px; height: 24px; }

    /* Sidebar - filesystem-like tree */
    .sidebar {
      width: var(--sidebar-w);
      min-width: var(--sidebar-w);
      background: var(--bg-elevated);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .sidebar-header {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border-subtle);
      flex-shrink: 0;
    }
    .sidebar-brand {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .nav-tree {
      flex: 1;
      overflow-y: auto;
      padding: 0.75rem 0;
    }
    .nav-section {
      margin-bottom: 0.5rem;
    }
    .nav-section-title {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--text-faint);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 0.5rem 1.25rem;
    }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1.25rem;
      color: var(--text);
      text-decoration: none;
      cursor: pointer;
      border: none;
      background: none;
      width: 100%;
      font-size: 0.9rem;
      font-family: inherit;
      text-align: left;
      transition: background 0.15s;
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      margin-left: 0.5rem;
      border-left: 2px solid transparent;
    }
    .nav-item:hover { background: var(--border-subtle); }
    .nav-item.active {
      background: var(--accent-bg);
      color: var(--accent);
      font-weight: 500;
      border-left-color: var(--accent);
    }
    .nav-item svg { flex-shrink: 0; opacity: 0.7; }
    .nav-item.active svg { opacity: 1; }
    .nav-group { margin-bottom: 0.25rem; }
    .nav-children { padding-left: 1.5rem; }
    .nav-child {
      display: flex;
      align-items: center;
      padding: 0.35rem 0.75rem;
      color: var(--text-muted);
      text-decoration: none;
      cursor: pointer;
      font-size: 0.85rem;
      border-radius: var(--radius-sm);
      margin: 0 0.25rem 0 0;
      transition: all 0.15s;
    }
    .nav-child:hover { background: var(--border-subtle); color: var(--text); }
    .nav-child.active { background: var(--accent-bg); color: var(--accent); font-weight: 500; }

    /* Main content */
    .main {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      padding-top: 0;
    }
    .main-inner {
      flex: 1;
      padding: 2rem;
      max-width: min(900px, 100%);
      margin: 0 auto;
      width: 100%;
    }
    @media (min-width: 1400px) {
      .main-inner { max-width: 960px; padding: 2.5rem; }
    }
    .main h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin: 0 0 0.5rem;
      letter-spacing: -0.02em;
    }
    .main h2 { font-size: 1.25rem; font-weight: 600; margin: 2rem 0 1rem; }
    .main h3 { font-size: 1.1rem; font-weight: 600; margin: 1.5rem 0 0.75rem; }

    /* Cards / blocks */
    .card {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      margin-bottom: 1rem;
      box-shadow: var(--shadow);
      transition: box-shadow 0.2s;
    }
    .card:hover { box-shadow: var(--shadow-lg); }
    .card h3 { margin-top: 0; }
    .empty {
      color: var(--text-muted);
      text-align: center;
      padding: 3rem 2rem;
      font-size: 0.95rem;
    }
    pre {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      background: var(--border-subtle);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 1rem;
      overflow-x: auto;
      margin: 0.5rem 0;
    }
    code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85em;
      background: var(--border-subtle);
      padding: 0.15em 0.4em;
      border-radius: 4px;
    }
    .mermaid-wrap {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      margin: 1rem 0;
      overflow-x: auto;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 200px;
    }
    .mermaid-wrap svg { max-width: 100%; }
    .doc-content { line-height: 1.7; }
    .doc-content h1 { font-size: 1.5rem; margin-top: 1.5rem; }
    .doc-content h2 { font-size: 1.2rem; margin-top: 1.2rem; }
    .doc-content ul { margin: 0.5rem 0; padding-left: 1.5rem; }
    .doc-content p { margin: 0.75rem 0; }
    .doc-content table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }
    .doc-content th, .doc-content td {
      border: 1px solid var(--border);
      padding: 0.5rem 0.75rem;
      text-align: left;
    }
    .doc-content th { background: var(--border-subtle); font-weight: 600; }
    .back-link:hover { color: var(--accent) !important; }
    .nav-item:focus-visible, .nav-child:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

    /* Loading */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem;
      color: var(--text-muted);
    }
    .spinner {
      width: 24px;
      height: 24px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Responsive */
    @media (max-width: 768px) {
      .header { display: flex; }
      .menu-btn { display: flex; }
      .main { padding-top: var(--header-h); }
      .main-inner { padding: 1.25rem; }
      .sidebar {
        position: fixed;
        top: var(--header-h);
        left: 0;
        bottom: 0;
        z-index: 90;
        transform: translateX(-100%);
        transition: transform 0.25s ease;
        box-shadow: var(--shadow-lg);
      }
      .sidebar.open { transform: translateX(0); }
      .nav-children { max-height: 200px; overflow-y: auto; }
      .sidebar-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.3);
        z-index: 85;
      }
      .sidebar-overlay.open { display: block; }
    }
  </style>
</head>
<body>
  <header class="header">
    <button class="menu-btn" id="menu-btn" aria-label="Toggle menu">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>
    <span style="margin-left: 0.5rem; font-weight: 600; font-size: 0.95rem;">Naffu</span>
  </header>

  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-brand">Workspace</div>
    </div>
    <nav class="nav-tree" id="nav-tree">
      <div class="nav-section">
        <div class="nav-section-title">General</div>
        <a class="nav-item active" href="#" data-view="overview">
          <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
          Overview
        </a>
        <div class="nav-group">
          <a class="nav-item" href="#" data-view="docs">
            <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/></svg>
            Docs
          </a>
          <div class="nav-children" id="doc-children"></div>
        </div>
      </div>
      <div class="nav-section">
        <div class="nav-section-title">Visual</div>
        <a class="nav-item" href="#" data-view="graph">
          <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
          Dependency Graph
        </a>
        <a class="nav-item" href="#" data-view="mermaids">
          <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 5a1 1 0 011-1h14a1 1 0 011 1v2a1 1 0 01-1 1H5a1 1 0 01-1-1V5zM4 13a1 1 0 011-1h6a1 1 0 011 1v6a1 1 0 01-1 1H5a1 1 0 01-1-1v-6zM16 13a1 1 0 011-1h2a1 1 0 011 1v6a1 1 0 01-1 1h-2a1 1 0 01-1-1v-6z"/></svg>
          Diagrams
        </a>
      </div>
      <div class="nav-section">
        <div class="nav-section-title">Data</div>
        <a class="nav-item" href="#" data-view="index">
          <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4"/></svg>
          Index
        </a>
      </div>
    </nav>
  </aside>

  <main class="main">
    <div class="main-inner">
      <div id="content">
        <h1>Naffu DeepWiki</h1>
        <p style="color: var(--text-muted); margin-bottom: 1.5rem;">Local-first documentation for your codebase.</p>
        <div class="card">
          <h3>Quick Start</h3>
          <p>Run <code>naffu init --agent=cursor</code> then <code>naffu index .</code> to analyze your repo. Ask your agent to document the project.</p>
        </div>
      </div>
    </div>
  </main>

  <script>
    mermaid.initialize({ startOnLoad: false, theme: 'neutral' });

    // Load doc tree for sidebar (Davia-style filesystem nav)
    async function loadDocTree() {
      try {
        const res = await fetch('docs/index.json');
        const data = await res.json();
        const pages = data.pages || [];
        const container = document.getElementById('doc-children');
        if (pages.length && container) {
          container.innerHTML = pages.slice(0, 12).map(p => 
            '<a class="nav-child" href="#" data-view="doc" data-slug="' + p.slug + '" data-title="' + (p.title || p.slug).replace(/"/g, '&quot;') + '">' + (p.title || p.slug) + '</a>'
          ).join('') + (pages.length > 12 ? '<div class="nav-section-title" style="padding: 0.5rem 0.75rem;">+ ' + (pages.length - 12) + ' more in Docs</div>' : '');
          container.querySelectorAll('.nav-child').forEach(el => {
            el.addEventListener('click', (e) => {
              e.preventDefault();
              document.querySelectorAll('.nav-item, .nav-child').forEach(n => n.classList.remove('active'));
              el.classList.add('active');
              document.querySelector('[data-view="docs"]')?.classList.add('active');
              closeSidebar();
              loadDocPage(el.dataset.slug, el.dataset.title);
            });
          });
        }
      } catch {}
    }
    loadDocTree();

    // Mobile sidebar toggle
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebar-overlay');
    const menuBtn = document.getElementById('menu-btn');
    function toggleSidebar() {
      sidebar?.classList.toggle('open');
      overlay?.classList.toggle('open');
      document.body.style.overflow = sidebar?.classList.contains('open') ? 'hidden' : '';
    }
    function closeSidebar() {
      sidebar?.classList.remove('open');
      overlay?.classList.remove('open');
      document.body.style.overflow = '';
    }
    menuBtn?.addEventListener('click', toggleSidebar);
    overlay?.addEventListener('click', closeSidebar);

    document.querySelectorAll('[data-view]').forEach(el => {
      el.addEventListener('click', (e) => {
        e.preventDefault();
        document.querySelectorAll('.nav-item, .nav-child').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('doc-children')?.querySelectorAll('.nav-child').forEach(n => n.classList.remove('active'));
        closeSidebar();
        loadView(el.dataset.view);
      });
    });

    function renderMarkdown(md) {
      if (typeof marked !== 'undefined') return marked.parse(md || '');
      return '<pre>' + (md || '').replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</pre>';
    }

    async function renderMermaid(code, container) {
      if (!code || !code.trim() || code.includes('No index')) {
        container.innerHTML = '<p class="empty">No graph yet. Run <code>naffu index .</code></p>';
        return;
      }
      try {
        const { svg } = await mermaid.render('mermaid-' + Date.now(), code);
        container.innerHTML = '<div class="mermaid-wrap">' + svg + '</div>';
      } catch (err) {
        container.innerHTML = '<pre>' + code + '</pre><p class="empty">Mermaid parse error. Raw diagram above.</p>';
      }
    }

    function showLoading() {
      const content = document.getElementById('content');
      content.innerHTML = '<div class="loading"><div class="spinner"></div><span style="margin-left: 0.75rem;">Loading…</span></div>';
    }

    async function loadDocPage(slug, title) {
      const content = document.getElementById('content');
      showLoading();
      try {
        const r = await fetch('docs/' + slug + '.json');
        const d = r.ok ? await r.json() : {};
        const md = d.content || '(empty)';
        content.innerHTML = '<a href="#" class="back-link" data-view="docs" style="display:inline-flex;align-items:center;gap:0.5rem;color:var(--text-muted);text-decoration:none;font-size:0.9rem;margin-bottom:1rem;"><svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>All Docs</a><h1>' + (title || d.title || slug) + '</h1><div class="doc-content">' + renderMarkdown(md) + '</div>';
        content.querySelector('.back-link')?.addEventListener('click', (e) => {
          e.preventDefault();
          document.querySelectorAll('.nav-item, .nav-child').forEach(n => n.classList.remove('active'));
          document.querySelector('[data-view="docs"]')?.classList.add('active');
          loadView('docs');
        });
      } catch {
        content.innerHTML = '<h1>Error</h1><p class="empty">Could not load page.</p>';
      }
    }

    async function loadView(name) {
      const content = document.getElementById('content');
      if (name === 'overview') {
        content.innerHTML = '<h1>Naffu DeepWiki</h1><p style="color: var(--text-muted); margin-bottom: 1.5rem;">Local-first documentation for your codebase.</p><div class="card"><h3>Quick Start</h3><p>Run <code>naffu init --agent=cursor</code> then <code>naffu index .</code> to analyze your repo. Ask your agent to document the project.</p></div>';
        return;
      }
      showLoading();
      try {
        const url = name === 'docs' ? 'docs/index.json' : name + '.json';
        const res = await fetch(url);
        const data = await res.json();
        if (name === 'docs') {
          const pages = data.pages || [];
          if (pages.length) {
            const html = await Promise.all(pages.map(async p => {
              const r = await fetch('docs/' + p.slug + '.json');
              const d = r.ok ? await r.json() : {};
              const md = d.content || '(empty)';
              return '<div class="card"><h3>' + (d.title || p.slug) + '</h3><div class="doc-content">' + renderMarkdown(md) + '</div></div>';
            }));
            content.innerHTML = '<h1>Docs</h1><p style="color: var(--text-muted); margin-bottom: 1.5rem;">' + pages.length + ' pages</p>' + html.join('');
          } else {
            content.innerHTML = '<h1>Docs</h1><p class="empty">No docs yet. Run <code>naffu index .</code></p>';
          }
        } else if (name === 'graph') {
          const mermaidCode = data.mermaid || '';
          content.innerHTML = '<h1>Dependency Graph</h1><p style="color: var(--text-muted); margin-bottom: 1.5rem;">Module import relationships</p><div id="mermaid-container"></div>';
          await renderMermaid(mermaidCode, document.getElementById('mermaid-container'));
        } else if (name === 'mermaids') {
          try {
            const idx = await fetch('mermaids/index.json').then(r => r.json());
            const files = idx.files || [];
            if (files.length) {
              const diagrams = await Promise.all(files.map(async f => {
                const code = await fetch('mermaids/' + f).then(r => r.text());
                const id = 'mermaid-' + f.replace(/\./g, '-') + '-' + Date.now();
                let html = '<div class="card"><h3>' + f.replace('.mmd','') + '</h3><div id="' + id + '" class="mermaid-wrap"></div></div>';
                return { html, id, code };
              }));
              content.innerHTML = '<h1>Diagrams</h1><p style="color: var(--text-muted); margin-bottom: 1.5rem;">' + files.length + ' Mermaid diagrams</p>' + diagrams.map(d => d.html).join('');
              for (const d of diagrams) {
                const el = document.getElementById(d.id);
                if (el) await renderMermaid(d.code, el);
              }
            } else {
              content.innerHTML = '<h1>Diagrams</h1><p class="empty">No Mermaid files yet. Create .mmd files in <code>.naffu/mermaids/</code> or ask your agent to add architecture diagrams.</p>';
            }
          } catch {
            content.innerHTML = '<h1>Diagrams</h1><p class="empty">No diagrams yet. Create .mmd files in <code>.naffu/mermaids/</code></p>';
          }
        } else if (name === 'index') {
          const files = data.files || [];
          content.innerHTML = '<h1>Index</h1><p style="color: var(--text-muted); margin-bottom: 1.5rem;">' + files.length + ' entries</p><pre>' + JSON.stringify(data, null, 2).slice(0, 4000) + (JSON.stringify(data).length > 4000 ? '\n\n...' : '') + '</pre>';
        }
      } catch {
        content.innerHTML = '<h1>Error</h1><p class="empty">Could not load data. Run <code>naffu init</code> and <code>naffu index .</code></p>';
      }
    }
  </script>
</body>
</html>
